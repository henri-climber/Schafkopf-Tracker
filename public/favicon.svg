<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <pattern id="vs" patternUnits="userSpaceOnUse" width="4" height="80">
      <rect x="0" y="0" width="2" height="80" fill="white" fill-opacity="0.35"/>
    </pattern>
    <clipPath id="eichel-clip">
      <ellipse cx="20" cy="23" rx="12" ry="14"/>
    </clipPath>
    <clipPath id="herz-clip">
      <path d="M20,56 C20,56 6,43 6,33 C6,27 10,22 16,22 C18,22 20,24 20,24 C20,24 22,22 24,22 C30,22 34,27 34,33 C34,43 20,56 20,56 Z"/>
    </clipPath>
    <clipPath id="schellen-clip">
      <path d="M60,44 C68,44 75,51 75,60 C75,69 68,76 60,76 C52,76 45,69 45,60 C45,51 52,44 60,44 Z"/>
    </clipPath>
  </defs>

  <!-- White rounded background (sticker effect) -->
  <rect width="80" height="80" rx="14" fill="white"/>

  <!-- === EICHEL (top-left) === -->
  <g>
    <!-- Stem -->
    <rect x="18" y="2" width="4" height="7" rx="2" fill="#2e7200"/>
    <!-- Cap (dark green) -->
    <path d="M8,9 C8,6 13,5 20,5 C27,5 32,6 32,9 C32,13 27,14 20,14 C13,14 8,13 8,9 Z" fill="#2e7200"/>
    <!-- Body (yellow with stripes) -->
    <ellipse cx="20" cy="26" rx="12" ry="14" fill="#d4a800"/>
    <ellipse cx="20" cy="26" rx="12" ry="14" fill="url(#vs)"/>
    <!-- Base -->
    <rect x="16" y="37" width="8" height="4" rx="1" fill="#d4a800"/>
    <rect x="12" y="39" width="16" height="3" rx="2" fill="#c89800"/>
  </g>

  <!-- === BLATT (top-right) === -->
  <g transform="translate(42, 1)">
    <!-- Spade/leaf shape (dark green, no stripes like original) -->
    <path d="M18,0 C18,0 3,12 3,22 C3,30 8,35 15,33 C14,36 12,39 10,41 L26,41 C24,39 22,36 21,33 C28,35 33,30 33,22 C33,12 18,0 18,0 Z" fill="#1a7e00"/>
    <!-- Leaf veins/highlight -->
    <path d="M18,7 C12,16 9,22 9,27" stroke="#25a800" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M18,7 C24,16 27,22 27,27" stroke="#25a800" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- === HERZ (bottom-left) === -->
  <g transform="translate(2, 40)">
    <!-- Heart shape (red with stripes) -->
    <path d="M18,36 C18,36 2,22 2,12 C2,5 7,0 13,0 C16,0 18,3 18,3 C18,3 20,0 23,0 C29,0 34,5 34,12 C34,22 18,36 18,36 Z" fill="#cc0f00"/>
    <path d="M18,36 C18,36 2,22 2,12 C2,5 7,0 13,0 C16,0 18,3 18,3 C18,3 20,0 23,0 C29,0 34,5 34,12 C34,22 18,36 18,36 Z" fill="url(#vs)"/>
  </g>

  <!-- === SCHELLEN (bottom-right) === -->
  <g transform="translate(42, 40)">
    <!-- Outer oval/bell (yellow with stripes) -->
    <path d="M17,0 C25,0 33,8 33,18 C33,28 25,38 17,40 C9,38 1,28 1,18 C1,8 9,0 17,0 Z" fill="#e8c800"/>
    <path d="M17,0 C25,0 33,8 33,18 C33,28 25,38 17,40 C9,38 1,28 1,18 C1,8 9,0 17,0 Z" fill="url(#vs)"/>
    <!-- Inner green leaf shape -->
    <path d="M17,7 C17,7 9,15 9,23 C9,31 13,36 17,38 C21,36 25,31 25,23 C25,15 17,7 17,7 Z" fill="#1a7e00"/>
  </g>
</svg>
